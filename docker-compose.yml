# Phase 12: tooling stack (postgres + db-bootstrap/update/doctor) is independent of bot runtime config.
# From a clean repo (no .env): docker compose up -d postgres && docker compose --profile tools run --rm db-bootstrap
# Bot runtime (token, provider, access) is environment-specific; pass via --env-file or -e. See docs.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bot
      POSTGRES_PASSWORD: bot
      POSTGRES_DB: bot
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bot -d bot"]
      interval: 2s
      timeout: 5s
      retries: 10

  db-bootstrap:
    build: .
    command: ["python", "-m", "app.db.cli", "bootstrap"]
    environment:
      BOT_DATABASE_URL: postgresql://bot:bot@postgres:5432/bot
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools

  db-update:
    build: .
    command: ["python", "-m", "app.db.cli", "update"]
    environment:
      BOT_DATABASE_URL: postgresql://bot:bot@postgres:5432/bot
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools

  db-doctor:
    build: .
    command: ["python", "-m", "app.db.cli", "doctor"]
    environment:
      BOT_DATABASE_URL: postgresql://bot:bot@postgres:5432/bot
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools

  bot:
    build: .
    # DB URL for container: use service hostname (postgres). Bot runtime (token, provider, access)
    # must be supplied via: docker compose run --rm --env-file <your-env-file> bot
    environment:
      BOT_DATABASE_URL: postgresql://bot:bot@postgres:5432/bot
    depends_on:
      postgres:
        condition: service_healthy
    # Override CMD so bot runs after DB is ready; app validates schema at startup
    command: ["python", "-m", "app.main"]
