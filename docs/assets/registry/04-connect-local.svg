<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">Connect existing bot to local registry</title>
  <desc id="desc">Two terminal panels showing an existing standalone bot being connected to the local registry and the resulting status output.</desc>
  <style>
    .bg { fill: #2b2b2b; }
    .panel { fill: #171717; stroke: #3a3a3a; stroke-width: 1; }
    .rule { stroke: #303030; stroke-width: 1; }
    .dot { fill: #505050; }
    .label { fill: #bddba9; font: 600 15px SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace; }
    .line { fill: #8dfc7c; font: 17px SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace; }
    .prompt { fill: #dfffd2; }
  </style>
  <rect class="bg" x="0" y="0" width="1200" height="640" rx="24"/>
  <g transform="translate(28 24)">
    <rect class="panel" x="0" y="0" width="1144" height="372" rx="18"/>
    <circle class="dot" cx="24" cy="24" r="6"/><circle class="dot" cx="44" cy="24" r="6"/><circle class="dot" cx="64" cy="24" r="6"/>
    <text class="label" x="92" y="29">connect existing bot to local registry</text>
    <line class="rule" x1="0" y1="48" x2="1144" y2="48"/>
    <text class="line" xml:space="preserve">
      <tspan class="prompt" x="28" y="82">$ ./octopus</tspan>
      <tspan x="28" dy="30">What would you like to do?</tspan>
      <tspan x="28" dy="30">  1. Add a bot</tspan>
      <tspan x="28" dy="30">  2. Manage bots</tspan>
      <tspan x="28" dy="30">  3. Connect bot to registry</tspan>
      <tspan x="28" dy="30">  4. Advanced</tspan>
      <tspan x="28" dy="30">Choose an option: 3</tspan>
      <tspan x="28" dy="30"></tspan>
      <tspan x="28" dy="30">Select a bot:</tspan>
      <tspan x="28" dy="30">  1. Example Bot (@example_bot)</tspan>
      <tspan x="28" dy="30">Bot slug or number: 1</tspan>
      <tspan x="28" dy="30">Press Enter to use the local registry, or type 'remote' to use a remote registry:</tspan>
      <tspan x="28" dy="30">Bot example-bot is now connected to the local registry.</tspan>
      <tspan x="28" dy="30">Registry UI: http://localhost:8787/ui</tspan>
    </text>

    <rect class="panel" x="0" y="398" width="1144" height="194" rx="18"/>
    <circle class="dot" cx="24" cy="422" r="6"/><circle class="dot" cx="44" cy="422" r="6"/><circle class="dot" cx="64" cy="422" r="6"/>
    <text class="label" x="92" y="427">verify with octopus status</text>
    <line class="rule" x1="0" y1="446" x2="1144" y2="446"/>
    <text class="line" xml:space="preserve">
      <tspan class="prompt" x="28" y="480">$ ./octopus status</tspan>
      <tspan x="28" dy="30">Bots:</tspan>
      <tspan x="28" dy="30">  Example Bot (@example_bot)    claude   registry     running</tspan>
      <tspan x="28" dy="30"></tspan>
      <tspan x="28" dy="30">Registry:</tspan>
      <tspan x="28" dy="30">  local      running    http://localhost:8787/ui</tspan>
      <tspan x="28" dy="30"></tspan>
      <tspan x="28" dy="30">Provider auth:</tspan>
      <tspan x="28" dy="30">  claude     authenticated</tspan>
      <tspan x="28" dy="30">  codex      not configured</tspan>
    </text>
  </g>
</svg>
