<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">BotFather — new bot token</title>
  <desc id="desc">Illustrative Telegram chat with BotFather: display name, username, and HTTP API token.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6c9ee4"/>
      <stop offset="45%" stop-color="#8e9eab"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="520" fill="url(#bg)"/>
  <g transform="translate(400 40)">
    <rect x="0" y="0" width="400" height="440" rx="12" fill="#fff" stroke="#000" stroke-opacity="0.12"/>
    <path d="M0 12 Q0 0 12 0 H388 Q400 0 400 12 V48 H0 Z" fill="#5288c1"/>
    <text x="16" y="31" fill="#fff" style="font-size:15px;font-weight:600;font-family:system-ui,-apple-system,sans-serif">BotFather</text>
    <rect x="0" y="48" width="400" height="392" fill="#e5ddd5"/>
    <rect x="20" y="68" width="300" height="72" rx="10" fill="#fff" stroke="#000" stroke-opacity="0.06"/>
    <text x="32" y="92" fill="#333" style="font-size:14px;font-family:system-ui,-apple-system,sans-serif">Alright, a new bot. How are we going to call it?</text>
    <rect x="120" y="156" width="260" height="40" rx="10" fill="#dcf8c6"/>
    <text x="132" y="182" fill="#222" style="font-size:14px;font-family:system-ui,-apple-system,sans-serif">My Project Helper</text>
    <rect x="20" y="212" width="340" height="88" rx="10" fill="#fff" stroke="#000" stroke-opacity="0.06"/>
    <text x="32" y="238" fill="#333" style="font-size:14px;font-family:system-ui,-apple-system,sans-serif">Good. Choose a username ending in bot.</text>
    <rect x="120" y="312" width="260" height="40" rx="10" fill="#dcf8c6"/>
    <text x="132" y="338" fill="#222" style="font-size:14px;font-family:system-ui,-apple-system,sans-serif">myproj_helper_bot</text>
    <rect x="20" y="368" width="360" height="56" rx="10" fill="#fff" stroke="#2a6ea5" stroke-width="1"/>
    <text x="32" y="392" fill="#0d47a1" style="font-size:13px;font-weight:600;font-family:ui-monospace,Menlo,monospace">Done! HTTP API token:</text>
    <text x="32" y="412" fill="#333" style="font-size:12px;font-family:ui-monospace,Menlo,monospace">123456789:AAH••••••••••••</text>
  </g>
</svg>
