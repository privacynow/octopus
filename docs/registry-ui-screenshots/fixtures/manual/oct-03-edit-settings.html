<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Octopus — edit settings</title>
  <style>
    body { margin:0; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; background:#0d1117; color:#c9d1d9; padding:28px; }
    .win { max-width:760px; border:1px solid #30363d; border-radius:10px; overflow:hidden; }
    .title { background:#161b22; padding:10px 14px; font-weight:700; color:#58a6ff; border-bottom:1px solid #30363d; }
    .body { padding:18px 20px; white-space:pre-wrap; line-height:1.45; font-size:14px; }
    .muted { color:#8b949e; }
  </style>
</head>
<body>
  <div class="win">
    <div class="title">Edit settings</div>
    <div class="body"><div data-doc="summary">Current settings for Demo (@demobot):
  Display name:  Demo
  Provider:      claude
  Mode:          registry
  Role:          developer
  Timeout:       3600s</div>

<div data-doc="menu">What would you like to change?
  <span class="muted">1.</span> Display name
  <span class="muted">2.</span> Role
  <span class="muted">3.</span> Tags
  <span class="muted">4.</span> Allowed users
  <span class="muted">5.</span> Timeout
  <span class="muted">6.</span> Open full config in editor
  <span class="muted">7.</span> Back</div></div>
  </div>
</body>
</html>
