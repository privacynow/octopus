<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Octopus — remote registry</title>
  <style>
    body { margin:0; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; background:#0d1117; color:#c9d1d9; padding:28px; }
    .win { max-width:760px; border:1px solid #30363d; border-radius:10px; overflow:hidden; }
    .title { background:#161b22; padding:10px 14px; font-weight:700; color:#58a6ff; border-bottom:1px solid #30363d; }
    .body { padding:18px 20px; white-space:pre-wrap; line-height:1.45; font-size:14px; }
    .muted { color:#8b949e; }
    .prompt { color:#79c0ff; }
  </style>
</head>
<body>
  <div class="win">
    <div class="title">Connect to remote registry</div>
    <div class="body"><span class="prompt" data-doc="url">Registry URL (https://…):</span> https://registry.example.com

<span class="prompt" data-doc="token">Enrollment token:</span> •••••••••••••••

<span class="prompt" data-doc="scope">Scope (full / channel / coordination):</span> full

<span class="muted">Saving connection… verifying HTTPS… enroll OK.</span></div>
  </div>
</body>
</html>
