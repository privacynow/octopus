<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Octopus — webhook</title>
  <style>
    body { margin:0; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; background:#0d1117; color:#c9d1d9; padding:28px; }
    .win { max-width:760px; border:1px solid #30363d; border-radius:10px; overflow:hidden; }
    .title { background:#161b22; padding:10px 14px; font-weight:700; color:#58a6ff; border-bottom:1px solid #30363d; }
    .body { padding:18px 20px; white-space:pre-wrap; line-height:1.45; font-size:14px; }
    .muted { color:#8b949e; }
    .prompt { color:#79c0ff; }
  </style>
</head>
<body>
  <div class="win">
    <div class="title">Configure webhook mode</div>
    <div class="body"><span class="prompt" data-doc="url">Webhook URL (https://…):</span> https://bot.example.com/hook/abc

<span class="prompt" data-doc="port">Listen port:</span> 8443

<span class="muted">BOT_MODE=webhook · shared runtime deployment</span></div>
  </div>
</body>
</html>
