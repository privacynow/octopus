<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>BotFather</title>
  <style>
    body { margin:0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background:#517da2; padding:24px; }
    .phone { max-width:420px; margin:0 auto; background:#fff; border-radius:12px; overflow:hidden; box-shadow:0 12px 48px rgba(0,0,0,.3); }
    .head { background:#2a6ea5; color:#fff; padding:10px 14px; font-weight:700; font-size:15px; }
    .chat { padding:14px; background:#e7f0f8; min-height:380px; font-size:14px; }
    .bf { background:#fff; border-radius:0 12px 12px 12px; padding:10px 12px; margin:10px 30px 10px 0; box-shadow:0 1px 2px rgba(0,0,0,.1); }
    .you { background:#dcf8c6; border-radius:12px 0 12px 12px; padding:8px 12px; margin:10px 0 10px 40px; text-align:right; }
    .kbd { font-family:monospace; background:#eef; padding:2px 6px; border-radius:4px; }
  </style>
</head>
<body>
  <div class="phone">
    <div class="head">BotFather</div>
    <div class="chat">
      <div class="bf" data-doc="bf">Alright, a new bot. How are we going to call it?</div>
      <div class="you">My Project Helper</div>
      <div class="bf">Good. Now let's choose a username for your bot. It must end in <span class="kbd">bot</span>.</div>
      <div class="you">myproj_helper_bot</div>
      <div class="bf" data-doc="token">Done! Use this token to access the HTTP API:
<code style="display:block;margin-top:8px;word-break:break-all;font-size:12px;">123456789:AAH…</code>
Keep your token secure.</div>
    </div>
  </div>
</body>
</html>
