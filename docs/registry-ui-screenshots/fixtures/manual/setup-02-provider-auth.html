<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Provider login</title>
  <style>
    body { margin:0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background:#1a1a2e; color:#eee; padding:32px; }
    .card { max-width:520px; margin:0 auto; background:#16213e; border-radius:12px; padding:24px; border:1px solid #0f3460; }
    h1 { margin:0 0 16px; font-size:18px; color:#e94560; }
    p { line-height:1.5; font-size:14px; color:#ccc; }
    .hint { margin-top:16px; padding:12px; background:#0f3460; border-radius:8px; font-size:13px; }
    code { color:#7ec8e3; }
  </style>
</head>
<body>
  <div class="card">
    <h1 data-doc="title">Octopus — provider authentication</h1>
    <p data-doc="body">During <code>./octopus</code>, the CLI may open a browser or print a URL for <strong>Claude</strong> or <strong>Codex</strong> login. Credentials are stored for Docker builds.</p>
    <div class="hint" data-doc="hint">Check <code>./octopus status</code> → Provider auth: authenticated</div>
  </div>
</body>
</html>
