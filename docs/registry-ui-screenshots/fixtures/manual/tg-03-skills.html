<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Telegram — skills</title>
  <style>
    body { margin:0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background:linear-gradient(180deg,#6c9ee4 0%,#8e9eab 40%); min-height:100vh; padding:24px; }
    .phone { max-width:400px; margin:0 auto; background:#fff; border-radius:12px; overflow:hidden; box-shadow:0 12px 48px rgba(0,0,0,.25); }
    .head { background:#5288c1; color:#fff; padding:12px 16px; font-weight:600; }
    .chat { padding:16px; background:#e5ddd5; min-height:420px; }
    .bubble-out { background:#dcf8c6; border-radius:10px 10px 0 10px; padding:8px 12px; margin:8px 0 8px 60px; font-size:14px; }
    .bubble-in { background:#fff; border-radius:10px; padding:12px; margin:8px 40px 8px 0; font-size:13px; line-height:1.5; }
  </style>
</head>
<body>
  <div class="phone">
    <div class="head">Skills</div>
    <div class="chat">
      <div class="bubble-out">/skills</div>
      <div class="bubble-in" data-doc="list"><strong>Active:</strong> (none)
<strong>Available:</strong> docs, sql, review

/skills list — browse catalog
/skills add &lt;name&gt; — activate
/skills setup &lt;name&gt; — configure</div>
    </div>
  </div>
</body>
</html>
