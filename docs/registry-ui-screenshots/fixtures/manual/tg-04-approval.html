<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Telegram — approval</title>
  <style>
    body { margin:0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background:linear-gradient(180deg,#6c9ee4 0%,#8e9eab 40%); min-height:100vh; padding:24px; }
    .phone { max-width:400px; margin:0 auto; background:#fff; border-radius:12px; overflow:hidden; box-shadow:0 12px 48px rgba(0,0,0,.25); }
    .head { background:#5288c1; color:#fff; padding:12px 16px; font-weight:600; }
    .chat { padding:16px; background:#e5ddd5; min-height:420px; }
    .bubble-in { background:#fff; border-radius:10px; padding:12px; margin:8px 40px 8px 0; font-size:13px; white-space:pre-wrap; }
    .hint { font-size:12px; color:#555; margin-top:8px; }
  </style>
</head>
<body>
  <div class="phone">
    <div class="head">Safe mode</div>
    <div class="chat">
      <div class="bubble-in" data-doc="plan"><strong>Plan pending</strong>
1. Read package.json
2. Run npm test

Reply with /approve or /reject</div>
      <div class="hint" data-doc="gate">/approval on|off|status · /approve · /reject · /cancel</div>
    </div>
  </div>
</body>
</html>
