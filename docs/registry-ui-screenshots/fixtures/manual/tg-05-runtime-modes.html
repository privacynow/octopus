<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Telegram — runtime modes</title>
  <style>
    body { margin:0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background:#f0f2f5; padding:28px; }
    h1 { font-size:18px; margin:0 0 16px; }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; max-width:900px; margin:0 auto; }
    .card { background:#fff; border-radius:10px; padding:16px; box-shadow:0 2px 8px rgba(0,0,0,.08); font-size:13px; line-height:1.5; }
    .card h2 { margin:0 0 8px; font-size:15px; color:#1565c0; }
    code { background:#f5f5f5; padding:2px 6px; border-radius:4px; font-size:12px; }
  </style>
</head>
<body>
  <h1 style="text-align:center">BOT_RUNTIME_MODE · command surface</h1>
  <div class="grid">
    <div class="card" data-doc="standalone">
      <h2>Standalone (default)</h2>
      Dedicated PTB process per bot. Full commands:
      <code>/new</code> <code>/guidance</code> <code>/cancel</code> <code>/approval</code> …
      See <code>bootstrap.py</code> non-shared branch.
    </div>
    <div class="card" data-doc="shared">
      <h2>Shared worker</h2>
      Smaller direct handler set; <code>/approval</code>, <code>/skills</code>, …
      route through <code>shared_command_handler</code> for worker dispatch.
    </div>
  </div>
</body>
</html>
