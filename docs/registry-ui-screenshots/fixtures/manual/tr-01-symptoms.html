<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Troubleshooting</title>
  <style>
    body { margin:0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background:#fff8e1; padding:28px; }
    .flow { max-width:720px; margin:0 auto; background:#fff; border:2px solid #ffb300; border-radius:12px; padding:20px 24px; font-size:15px; line-height:1.6; }
    h1 { margin:0 0 12px; font-size:18px; color:#e65100; }
    ol { margin:0; padding-left:22px; }
    li { margin:8px 0; }
    code { background:#fff3e0; padding:2px 6px; border-radius:4px; }
  </style>
</head>
<body>
  <div class="flow" data-doc="flow">
    <h1>When something breaks</h1>
    <ol>
      <li><code>./octopus status</code> — bots, registry URL, provider auth</li>
      <li><code>./octopus doctor</code> — container + Telegram + provider checks</li>
      <li><code>./octopus logs &lt;slug&gt;</code> — live bot output</li>
      <li>Registry UI stale? Confirm registry container + WebSocket stack</li>
    </ol>
  </div>
</body>
</html>
