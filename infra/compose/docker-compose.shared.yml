# Shared Runtime override: split ingress and worker roles over the same bot image.
# Usage:
#   docker compose --project-directory . \
#     -f infra/compose/docker-compose.yml \
#     -f infra/compose/docker-compose.shared.yml \
#     --profile bot up -d --scale bot-worker=2 bot-webhook bot-worker

services:
  bot-webhook:
    image: octopus-agent:${BOT_PROVIDER:-claude}
    profiles:
      - bot
    env_file:
      - ${BOT_ENV_FILE:-/dev/null}
    environment:
      BOT_PROVIDER: ${BOT_PROVIDER:-claude}
      BOT_DATA_DIR: /home/bot/data
      BOT_RUNTIME_MODE: shared
      BOT_MODE: webhook
      BOT_PROCESS_ROLE: webhook
      BOT_WEBHOOK_LISTEN: 0.0.0.0
    volumes:
      - ${PROVIDER_AUTH_DIR:-.deploy/provider-auth/claude}:/home/bot/.provider-auth:rw
      - bot-home:/home/bot/data
    command: ["python", "-m", "app.main"]
    ports:
      - "${BOT_WEBHOOK_PORT:-8443}:8443"

  bot-worker:
    image: octopus-agent:${BOT_PROVIDER:-claude}
    profiles:
      - bot
    env_file:
      - ${BOT_ENV_FILE:-/dev/null}
    environment:
      BOT_PROVIDER: ${BOT_PROVIDER:-claude}
      BOT_DATA_DIR: /home/bot/data
      BOT_RUNTIME_MODE: shared
      BOT_MODE: webhook
      BOT_PROCESS_ROLE: worker
    volumes:
      - ${PROVIDER_AUTH_DIR:-.deploy/provider-auth/claude}:/home/bot/.provider-auth:rw
      - bot-home:/home/bot/data
    command: ["python", "-m", "app.main"]
