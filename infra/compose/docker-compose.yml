# Phase 13: Local Runtime default — bot uses SQLite (no Postgres). Optional: postgres + db-* for BOT_DATABASE_URL.
# bot-home volume: provider auth (Claude/Codex) and BOT_DATA_DIR (sessions + transport SQLite).

volumes:
  bot-home:
  registry-data:

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bot
      POSTGRES_PASSWORD: bot
      POSTGRES_DB: bot
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bot -d bot"]
      interval: 2s
      timeout: 5s
      retries: 10

  db-bootstrap:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
    command: ["python", "-m", "app.db.cli", "bootstrap"]
    environment:
      BOT_DATABASE_URL: postgresql://bot:bot@postgres:5432/bot
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools

  db-update:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
    command: ["python", "-m", "app.db.cli", "update"]
    environment:
      BOT_DATABASE_URL: postgresql://bot:bot@postgres:5432/bot
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools

  db-doctor:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
    command: ["python", "-m", "app.db.cli", "doctor"]
    environment:
      BOT_DATABASE_URL: postgresql://bot:bot@postgres:5432/bot
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools

  # Provider-only checks (no Postgres): used by provider_status.sh and provider_login.sh.
  # Same image and bot-home as bot; no depends_on so Compose does not start postgres.
  bot-provider:
    image: octopus-agent:${BOT_PROVIDER:-claude}
    profiles:
      - bot
    env_file:
      - ${BOT_ENV_FILE:-.env.bot}
    environment:
      BOT_DATA_DIR: /home/bot/data
    volumes:
      - bot-home:/home/bot
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["python", "-m", "app.main", "--provider-health"]

  # Bot service (Local Runtime default: SQLite in BOT_DATA_DIR, no Postgres).
  # Build: ./scripts/provider/build_bot_image.sh.
  # Start: docker compose --project-directory . -f infra/compose/docker-compose.yml --profile bot --env-file .env.bot up -d bot
  # Optional Postgres: set BOT_DATABASE_URL in .env.bot and start postgres first; use compose override or run postgres + bot.
  bot:
    image: octopus-agent:${BOT_PROVIDER:-claude}
    profiles:
      - bot
    env_file:
      - ${BOT_ENV_FILE:-.env.bot}
    environment:
      BOT_DATA_DIR: /home/bot/data
    volumes:
      - bot-home:/home/bot
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["python", "-m", "app.main"]

  registry:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
    profiles:
      - registry
    environment:
      REGISTRY_DB_PATH: /data/registry.sqlite3
      REGISTRY_ENROLL_TOKEN: ${REGISTRY_ENROLL_TOKEN:?Set REGISTRY_ENROLL_TOKEN in .env.registry}
      REGISTRY_UI_TOKEN: ${REGISTRY_UI_TOKEN-}
      REGISTRY_ALLOW_HTTP: ${REGISTRY_ALLOW_HTTP-}
    volumes:
      - registry-data:/data
    ports:
      - "${REGISTRY_BIND_HOST:-127.0.0.1}:${REGISTRY_PORT:-8787}:8787"
    command: ["uvicorn", "app.channels.registry.http:app", "--host", "0.0.0.0", "--port", "8787"]

  # TEST/DEV ONLY: stub-provider image for E2E when real provider unavailable (E2E_USE_STUB_IMAGE=1).
  bot-stub:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.runnable
    profiles:
      - stub
    environment:
      BOT_DATABASE_URL: postgresql://bot:bot@postgres:5432/bot
    depends_on:
      postgres:
        condition: service_healthy
    command: ["python", "-m", "app.main"]
