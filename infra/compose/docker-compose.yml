# Postgres-backed runtime and registry. Provider auth is a shared bind mount.

volumes:
  bot-home:
  data:

networks:
  default:
    name: ${OCTOPUS_NETWORK:-octopus-net}
    external: true

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bot
      POSTGRES_PASSWORD: bot
      POSTGRES_DB: bot
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bot -d bot"]
      interval: 2s
      timeout: 5s
      retries: 10
    networks:
      default:
        aliases:
          - ${OCTOPUS_DB_HOST:-postgres}

  db-bootstrap:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
    command: ["python", "-m", "app.db.cli", "bootstrap"]
    environment:
      OCTOPUS_DATABASE_URL: ${OCTOPUS_DATABASE_URL:-postgresql://bot:bot@${OCTOPUS_DB_HOST:-postgres}:5432/bot}
    depends_on:
      postgres:
        condition: service_healthy

  db-update:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
    command: ["python", "-m", "app.db.cli", "update"]
    environment:
      OCTOPUS_DATABASE_URL: ${OCTOPUS_DATABASE_URL:-postgresql://bot:bot@${OCTOPUS_DB_HOST:-postgres}:5432/bot}
    depends_on:
      postgres:
        condition: service_healthy

  db-doctor:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
    command: ["python", "-m", "app.db.cli", "doctor"]
    environment:
      OCTOPUS_DATABASE_URL: ${OCTOPUS_DATABASE_URL:-postgresql://bot:bot@${OCTOPUS_DB_HOST:-postgres}:5432/bot}
    depends_on:
      postgres:
        condition: service_healthy

  # Provider-only checks (no runtime DB access): used by provider_status.sh and provider_login.sh.
  bot-provider:
    image: octopus-agent:${BOT_PROVIDER:-claude}
    profiles:
      - bot
    env_file:
      - ${BOT_ENV_FILE:-/dev/null}
    environment:
      BOT_PROVIDER: ${BOT_PROVIDER:-claude}
      BOT_DATA_DIR: /home/bot/data
    volumes:
      - ${PROVIDER_AUTH_DIR:-.deploy/provider-auth/claude}:/home/bot/.provider-auth:rw
      - bot-home:/home/bot/data
    command: ["python", "-m", "app.main", "--provider-health"]

  # Bot service backed by Postgres. Build via ./scripts/provider/build_bot_image.sh and start via ./octopus.
  bot:
    image: octopus-agent:${BOT_PROVIDER:-claude}
    profiles:
      - bot
    env_file:
      - ${BOT_ENV_FILE:-/dev/null}
    environment:
      BOT_PROVIDER: ${BOT_PROVIDER:-claude}
      BOT_DATA_DIR: /home/bot/data
      OCTOPUS_DATABASE_URL: ${OCTOPUS_DATABASE_URL:-postgresql://bot:bot@${OCTOPUS_DB_HOST:-postgres}:5432/bot}
    volumes:
      - ${PROVIDER_AUTH_DIR:-.deploy/provider-auth/claude}:/home/bot/.provider-auth:rw
      - bot-home:/home/bot/data
    depends_on:
      postgres:
        condition: service_healthy
    command: ["python", "-m", "app.main"]

  service:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.registry
    profiles:
      - registry
    environment:
      OCTOPUS_DATABASE_URL: ${OCTOPUS_DATABASE_URL:-postgresql://bot:bot@${OCTOPUS_DB_HOST:-postgres}:5432/bot}
      REGISTRY_ENROLL_TOKEN: ${REGISTRY_ENROLL_TOKEN:?Set REGISTRY_ENROLL_TOKEN in .deploy/registry/.env}
      REGISTRY_UI_TOKEN: ${REGISTRY_UI_TOKEN:?Set REGISTRY_UI_TOKEN in .deploy/registry/.env}
      REGISTRY_ALLOW_HTTP: ${REGISTRY_ALLOW_HTTP-}
    ports:
      - "${REGISTRY_BIND_HOST:-127.0.0.1}:${REGISTRY_PORT:-8787}:8787"
    networks:
      default:
        aliases:
          - registry
    depends_on:
      postgres:
        condition: service_healthy
    command: ["python", "-m", "octopus_registry.main"]

  # TEST/DEV ONLY: stub-provider image for E2E when real provider unavailable (E2E_USE_STUB_IMAGE=1).
  bot-stub:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.runnable
    profiles:
      - stub
    environment:
      OCTOPUS_DATABASE_URL: ${OCTOPUS_DATABASE_URL:-postgresql://bot:bot@${OCTOPUS_DB_HOST:-postgres}:5432/bot}
    depends_on:
      postgres:
        condition: service_healthy
    command: ["python", "-m", "app.main"]
